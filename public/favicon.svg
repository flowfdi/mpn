<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Forest green background, rounded corners -->
  <rect width="32" height="32" rx="7" fill="#228B22"/>

  <!-- Spine vertebrae — cervical to coccyx, each body wider then tapering -->

  <!-- Cervical (top, narrow) -->
  <rect x="12" y="3.5" width="8" height="4" rx="2" fill="white"/>

  <!-- Thoracic -->
  <rect x="11" y="9.5" width="10" height="4.5" rx="2.25" fill="white"/>

  <!-- Lumbar (widest body) -->
  <rect x="10" y="16" width="12" height="5" rx="2.5" fill="white"/>

  <!-- Sacrum (slight fade) -->
  <rect x="11.5" y="22.5" width="9" height="4" rx="2" fill="white" opacity="0.86"/>

  <!-- Coccyx (most faded, smallest) -->
  <rect x="13.5" y="27.5" width="5" height="2.5" rx="1.5" fill="white" opacity="0.63"/>
</svg>
